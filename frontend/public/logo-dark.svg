<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" fill="none">
  <!-- Definitions for Gradients -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B45309;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Emblem Section -->
  <g transform="translate(10, 10)">
    <!-- Shield Background (White Border for Dark Mode) -->
    <path d="M30 2 L58 12 V30 C58 48 46 62 30 68 C14 62 2 48 2 30 V12 L30 2 Z" fill="none" stroke="url(#goldGradient)" stroke-width="2"/>
    
    <!-- Monogram "IE" -->
    <text x="30" y="45" font-family="Times New Roman, serif" font-weight="bold" font-size="28" fill="#FFFFFF" text-anchor="middle">IE</text>
    
    <!-- Crown/Star Element -->
    <path d="M30 15 L32 20 L37 20 L33 24 L35 29 L30 26 L25 29 L27 24 L23 20 L28 20 Z" fill="url(#goldGradient)"/>
  </g>

  <!-- Text Section -->
  <g transform="translate(80, 25)">
    <!-- Main Title with Serif Font for Luxury -->
    <text x="0" y="20" font-family="Times New Roman, serif" font-weight="bold" font-size="26" fill="#FFFFFF" letter-spacing="1">IMPORTAR</text>
    <text x="155" y="20" font-family="Arial, sans-serif" font-weight="normal" font-size="26" fill="#D97706" letter-spacing="1">ESPAÑA</text>
    
    <!-- Subtitle -->
    <line x1="2" y1="32" x2="260" y2="32" stroke="#D97706" stroke-width="1" opacity="0.5"/>
    <text x="2" y="45" font-family="Arial, sans-serif" font-weight="bold" font-size="9" fill="#94A3B8" letter-spacing="5" text-transform="uppercase">Premium Automotive Services</text>
  </g>
</svg>
